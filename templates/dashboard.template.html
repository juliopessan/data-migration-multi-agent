<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PAGE_TITLE}}</title>
<meta name="description" content="{{PAGE_DESCRIPTION}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
:root {
  --paper: #FAF8F4;
  --ink: #121610;
  --ember: #FF5800;
  --ember-deep: #C43E00;
  --graphite: #3D3C39;
  --smoke: #8B8A86;
  --line: #E8E6E1;
  --card: #FFFBF7;
  --display: 'Space Grotesk', system-ui;
  --body: 'Inter', system-ui;
  --mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
::selection { background: var(--ember); color: #fff; }
:focus-visible { outline: 2px solid var(--ember); outline-offset: 3px; }

#progress { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--ember), var(--ember-deep)); width: 0; z-index: 200; transition: width 0.1s linear; }

#loader { position: fixed; inset: 0; background: var(--ink); z-index: 500; display: flex; align-items: flex-end; justify-content: space-between; padding: 40px 48px; color: var(--paper); }
#loader .load-count { font-family: var(--display); font-weight: 700; font-size: clamp(4rem, 14vw, 11rem); line-height: 0.85; letter-spacing: -0.04em; color: var(--paper); }
#loader .load-count sup { font-size: 0.25em; color: var(--ember); vertical-align: super; }
#loader .load-label { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255, 255, 255, 0.5); display: flex; align-items: center; gap: 10px; padding-bottom: 14px; }
#loader .load-label .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ember); animation: pulse 1.2s infinite; }
#loader.done { transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1); transform: translateY(-100%); }
body.loading { overflow: hidden; }

@keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 88, 0, 0.5); } 50% { opacity: 0.4; box-shadow: 0 0 0 7px rgba(255, 88, 0, 0); } }

#grain { position: fixed; inset: -100%; z-index: 300; pointer-events: none; opacity: 0.05; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' seed='2'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); animation: grain 7s steps(10) infinite; }
@keyframes grain { 0% { transform: translate(0); } 100% { transform: translate(-2px, -2px); } }

#glow { position: fixed; width: 520px; height: 520px; border-radius: 50%; pointer-events: none; z-index: 0; background: radial-gradient(circle, rgba(255, 88, 0, 0.15), transparent 70%); transform: translate(-50%, -50%); transition: opacity 0.3s; opacity: 0; }
body:hover #glow { opacity: 1; }

.parallax-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.grid-bg { background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px); background-size: 64px 64px; opacity: 0.35; will-change: transform; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); will-change: transform; }
.orb-1 { width: 480px; height: 480px; background: rgba(255, 88, 0, 0.1); top: -120px; right: -120px; }
.orb-2 { width: 380px; height: 380px; background: rgba(196, 62, 0, 0.07); top: 60vh; left: -140px; }
.orb-3 { width: 300px; height: 300px; background: rgba(255, 88, 0, 0.06); top: 140vh; right: 10vw; }

main, nav, footer { position: relative; z-index: 1; }

nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(250, 248, 244, 0.82); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); transition: transform 0.35s ease; }
nav.hide { transform: translateY(-100%); }
.nav-inner { max-width: 1180px; margin: 0 auto; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: var(--mono); font-weight: 700; font-size: 0.95rem; text-decoration: none; letter-spacing: -0.02em; }
.logo span { color: var(--ember); }
.nav-links { display: flex; gap: 26px; align-items: center; }
.nav-links a { font-family: var(--mono); font-size: 0.78rem; text-decoration: none; color: var(--graphite); letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--ember); }
.nav-cta { border: 1.5px solid var(--ink); padding: 8px 18px; border-radius: 2px; color: var(--ink)!important; transition: all 0.25s; }
.nav-cta:hover { background: var(--ink); color: var(--paper)!important; transform: translateY(-1px); }
@media(max-width: 760px) { .nav-links a:not(.nav-cta) { display: none; } }

.hero { padding: 170px 32px 90px; max-width: 1180px; margin: 0 auto; position: relative; display: grid; grid-template-columns: 1.25fr 0.75fr; gap: 56px; align-items: center; }
@media(max-width: 920px) { .hero { grid-template-columns: 1fr; gap: 48px; } }

.eyebrow { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--smoke); display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.eyebrow::before { content: ""; width: 34px; height: 1.5px; background: var(--ember); }

h1 { font-family: var(--display); font-weight: 600; font-size: clamp(2.4rem, 6vw, 4.6rem); line-height: 1.04; letter-spacing: -0.03em; max-width: 15ch; }
h1 .word { display: inline-block; opacity: 0; transform: translateY(30px) rotate(2deg); animation: wordIn 0.7s cubic-bezier(0.2, 0.7, 0.2, 1) forwards; }
@keyframes wordIn { to { opacity: 1; transform: none; } }

h1 .strike { position: relative; color: var(--smoke); white-space: nowrap; }
h1 .strike::after { content: ""; position: absolute; left: -2%; top: 54%; height: 3px; background: var(--ember); transform: rotate(-1.5deg); width: 0; animation: strikeIn 0.5s ease forwards 1.3s; }
@keyframes strikeIn { to { width: 104%; } }

.hero-sub { margin-top: 28px; font-size: 1.12rem; color: var(--graphite); max-width: 52ch; opacity: 0; animation: fadeUp 0.8s ease forwards 1s; }
.hero-row { display: flex; gap: 16px; margin-top: 40px; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.8s ease forwards 1.2s; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

.btn { font-family: var(--mono); font-size: 0.82rem; letter-spacing: 0.04em; text-transform: uppercase; text-decoration: none; padding: 14px 26px; border-radius: 2px; transition: all 0.25s; display: inline-flex; align-items: center; gap: 8px; will-change: transform; }
.btn-primary { background: var(--ink); color: var(--paper); border: 1.5px solid var(--ink); }
.btn-primary:hover { background: var(--ember); border-color: var(--ember); box-shadow: 0 8px 24px rgba(255, 88, 0, 0.3); }
.btn-ghost { border: 1.5px solid var(--line); color: var(--graphite); }
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

.meter { margin: 72px 32px 0; max-width: 1180px; background: var(--ink); color: var(--paper); border-radius: 8px; overflow: hidden; box-shadow: 0 24px 64px rgba(18, 16, 14, 0.18); will-change: transform; }
@media(min-width: 1244px) { .meter { margin-left: auto; margin-right: auto; } }
.meter-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.12); font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255, 255, 255, 0.55); }
.meter-head span { display: flex; align-items: center; gap: 8px; }
.meter-head i { color: var(--ember); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ember); display: inline-block; animation: pulse 2s infinite; }
.meter-body { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: rgba(255, 255, 255, 0.1); }
.meter-cell { background: var(--ink); padding: 28px 24px; position: relative; overflow: hidden; }
.meter-cell::after { content: ""; position: absolute; inset: 0; background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.05) 50%, transparent 70%); transform: translateX(-100%); animation: sheen 5s infinite; }
@keyframes sheen { 20% { transform: translateX(100%); } 100% { transform: translateX(100%); } }
.meter-cell .val { font-family: var(--mono); font-size: clamp(1.6rem, 3vw, 2.4rem); font-weight: 700; letter-spacing: -0.02em; }
.meter-cell .val.ember { color: var(--ember); }
.meter-cell .lbl { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.09em; text-transform: uppercase; color: rgba(255, 255, 255, 0.5); margin-top: 8px; display: flex; align-items: center; gap: 6px; }
@media(max-width: 820px) { .meter-body { grid-template-columns: repeat(2, 1fr); } }

section { max-width: 1180px; margin: 0 auto; padding: 110px 32px 0; }
.sec-label { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ember); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
h2 { font-family: var(--display); font-weight: 600; font-size: clamp(1.7rem, 3.4vw, 2.5rem); letter-spacing: -0.02em; line-height: 1.15; max-width: 24ch; }
.sec-intro { margin-top: 18px; color: var(--graphite); max-width: 60ch; font-size: 1.05rem; }

.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px; margin-top: 52px; }
.grid-item { border-top: 2px solid var(--ink); padding-top: 22px; transition: border-color 0.3s; }
.grid-item:hover { border-color: var(--ember); }
.grid-item h3 { font-family: var(--display); font-size: 1.12rem; font-weight: 600; margin-bottom: 10px; }
.grid-item p { font-size: 0.94rem; color: var(--graphite); }
.grid-item .emoji { font-size: 1.8rem; margin-bottom: 12px; }
@media(max-width: 820px) { .grid-2 { grid-template-columns: 1fr; } }

.impact { background: var(--ink); color: var(--paper); border-radius: 8px; padding: 64px 48px; margin-top: 52px; position: relative; overflow: hidden; will-change: transform; }
.impact::before { content: ""; position: absolute; top: -50%; right: -20%; width: 60%; height: 200%; background: radial-gradient(circle, rgba(255, 88, 0, 0.12), transparent 60%); pointer-events: none; }
.impact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px 56px; position: relative; }
.impact-item { border-left: 2px solid var(--ember); padding-left: 22px; }
.impact-item .big { font-family: var(--display); font-size: clamp(1.9rem, 4vw, 2.8rem); font-weight: 700; letter-spacing: -0.02em; }
.impact-item p { color: rgba(255, 255, 255, 0.72); font-size: 0.95rem; margin-top: 6px; }
@media(max-width: 720px) { .impact-grid { grid-template-columns: 1fr; } .impact { padding: 44px 28px; } }

.data-table { width: 100%; border-collapse: collapse; margin-top: 40px; background: var(--card); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 12px rgba(18, 16, 14, 0.08); }
.data-table thead { background: var(--ink); color: var(--paper); }
.data-table th { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 16px 20px; text-align: left; font-weight: 600; }
.data-table td { padding: 18px 20px; border-bottom: 1px solid var(--line); font-size: 0.95rem; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover { background: rgba(255, 88, 0, 0.04); }
.data-table .mono { font-family: var(--mono); font-size: 0.85rem; color: var(--smoke); }
.data-table .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: rgba(255, 88, 0, 0.1); color: var(--ember); }

.cta { margin: 120px auto 0; max-width: 1180px; padding: 0 32px 120px; text-align: center; }
.cta-box { border: 2px solid var(--ink); border-radius: 8px; padding: 72px 32px; position: relative; overflow: hidden; background: var(--card); }
.cta-box::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, var(--ember), var(--ember-deep), var(--ember)); background-size: 200% 100%; animation: flow 4s linear infinite; }
@keyframes flow { to { background-position: 200% 0; } }
.cta h2, .cta p { margin-left: auto; margin-right: auto; }
.cta p { margin-top: 18px; color: var(--graphite); max-width: 48ch; }
.cta .btn { margin-top: 36px; }

footer { border-top: 1px solid var(--line); padding: 32px; font-family: var(--mono); font-size: 0.75rem; color: var(--smoke); display: flex; justify-content: space-between; max-width: 1180px; margin: 0 auto; flex-wrap: wrap; gap: 12px; }

.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.2, 0.7, 0.2, 1), transform 0.7s cubic-bezier(0.2, 0.7, 0.2, 1); }
.reveal.in { opacity: 1; transform: none; }
.stagger > * { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1); }
.stagger.in > * { opacity: 1; transform: none; }
.stagger.in > *:nth-child(1) { transition-delay: 0.05s; }
.stagger.in > *:nth-child(2) { transition-delay: 0.15s; }
.stagger.in > *:nth-child(3) { transition-delay: 0.25s; }
.stagger.in > *:nth-child(4) { transition-delay: 0.35s; }
.stagger.in > *:nth-child(5) { transition-delay: 0.45s; }
.stagger.in > *:nth-child(6) { transition-delay: 0.55s; }

body.gsap .reveal, body.gsap .stagger > *, 
body.gsap h1 .word, body.gsap .hero-sub, body.gsap .hero-row {
  opacity: 1; transform: none; transition: none; animation: none;
}
</style>
</head>
<body class="loading">

<div id="loader">
  <div class="load-count"><span class="loading-number">0</span><sup>%</sup></div>
  <div class="load-label">
    <span class="dot"></span>
    {{LOADING_TEXT}}
  </div>
</div>

<div id="grain"></div>
<div id="progress"></div>
<div id="glow"></div>

<div class="parallax-layer grid-bg" data-speed="0.08"></div>
<div class="parallax-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<nav id="nav">
  <div class="nav-inner">
    <div class="logo">{{LOGO_TEXT}}<span>.</span>{{LOGO_SUFFIX}}</div>
    <div class="nav-links">
      {{NAV_LINKS}}
    </div>
  </div>
</nav>

<main>

<header class="hero" id="top">
  <div>
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>
      {{HERO_TITLE}}
    </h1>
    <p class="hero-sub">{{HERO_SUBTITLE}}</p>
    <div class="hero-row">
      {{HERO_BUTTONS}}
    </div>
  </div>
</header>

<div class="meter reveal" id="meter">
  <div class="meter-head">
    <span>{{METER_TITLE}}</span>
    <span><span class="dot"></span> {{METER_SUBTITLE}}</span>
  </div>
  <div class="meter-body">
    {{METER_CELLS}}
  </div>
</div>

{{MAIN_SECTIONS}}

<div class="cta reveal">
  <div class="cta-box">
    <h2>{{CTA_TITLE}}</h2>
    <p>{{CTA_SUBTITLE}}</p>
    <a href="{{CTA_LINK}}" class="btn btn-primary">{{CTA_BUTTON_TEXT}}</a>
  </div>
</div>

</main>

<footer>
  <div>{{FOOTER_LEFT}}</div>
  <div>{{FOOTER_RIGHT}}</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
gsap.registerPlugin(ScrollTrigger);

// PRELOADER
function initPreloader() {
  const loader = document.getElementById('loader');
  const count = document.querySelector('.loading-number');
  let current = 0;

  const interval = setInterval(() => {
    current += Math.random() * 40;
    if (current > 90) current = 90;
    count.textContent = Math.floor(current);
  }, 100);

  setTimeout(() => {
    clearInterval(interval);
    current = 100;
    count.textContent = current;
    loader.classList.add('done');
    document.body.classList.remove('loading');
    document.body.classList.add('gsap');
  }, 2000);
}

// SCROLL PROGRESS
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const progress = document.getElementById('progress');
  progress.style.width = (window.scrollY / (h.scrollHeight - window.innerHeight)) * 100 + '%';
});

// NAV HIDE ON SCROLL
let lastScrollY = 0;
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  if (window.scrollY > lastScrollY && window.scrollY > 100) {
    nav.classList.add('hide');
  } else {
    nav.classList.remove('hide');
  }
  lastScrollY = window.scrollY;
});

// REVEAL ON SCROLL
function initReveal() {
  const reveals = document.querySelectorAll('.reveal');
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('in');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  reveals.forEach(reveal => observer.observe(reveal));
}

// GLOW FOLLOW
document.addEventListener('mousemove', (e) => {
  const glow = document.getElementById('glow');
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});

// PARALLAX
const parallaxLayers = document.querySelectorAll('.parallax-layer');
window.addEventListener('scroll', () => {
  parallaxLayers.forEach((layer, i) => {
    const speed = parseFloat(layer.dataset.speed) || 0.05;
    layer.style.transform = `translateY(${window.scrollY * speed}px)`;
  });
});

// INIT
initPreloader();
initReveal();
</script>

</body>
</html>
