name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build and development dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"
      - name: Ruff SDK and tests
        run: ruff check src/migration_sdk tests
      - name: Mypy SDK
        run: mypy src/migration_sdk
      - name: Pytest
        run: pytest -q
      - name: Build distributions
        run: python -m build
      - name: Verify wheel installation
        run: |
          python -m venv /tmp/package-smoke
          /tmp/package-smoke/bin/pip install dist/*.whl
          /tmp/package-smoke/bin/python -c "import migration_agents, migration_sdk"
